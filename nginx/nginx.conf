# weather-cache — nginx reverse proxy that caches Open-Meteo forecast responses.
#
# Flow:  client/Grafana -> nginx (proxy_cache) -> https://api.open-meteo.com
#   * cache MISS  -> fetch upstream, store on disk, serve
#   * cache HIT   -> serve from disk, NO upstream call
#   * upstream 429/5xx/timeout -> serve last good (stale) copy  (rate-limit resilience)
#
# See docs/nginx-caching.md for how to tune the cache window.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # --- Cache storage -------------------------------------------------------
    # keys_zone : 10 MB of keys/metadata in shared memory (~80k entries)
    # max_size  : 100 MB cap of cached bodies on disk
    # inactive  : drop entries not requested for 24h
    proxy_cache_path /var/cache/nginx/openmeteo
        levels=1:2
        keys_zone=openmeteo:10m
        max_size=100m
        inactive=24h
        use_temp_path=off;

    # DNS resolver so the upstream hostname is re-resolved at runtime
    # (required because proxy_pass uses a variable below).
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # Log line that surfaces the cache result (HIT / MISS / STALE / ...).
    log_format cache '$remote_addr [$time_local] "$request" status=$status '
                     'cache=$upstream_cache_status rt=$request_time '
                     'urt=$upstream_response_time';

    server {
        listen 8080;
        server_name _;

        access_log /var/log/nginx/access.log cache;

        # Health endpoint for the compose healthcheck / NPM.
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ---- Cached proxy to Open-Meteo ------------------------------------
        # Matches every /v1/* endpoint (forecast, air-quality, etc.).
        location /v1/ {
            set $upstream_host api.open-meteo.com;
            proxy_pass https://$upstream_host;          # variable => uses resolver above
            proxy_http_version 1.1;

            proxy_ssl_server_name on;                   # send SNI for api.open-meteo.com
            proxy_set_header Host api.open-meteo.com;
            proxy_set_header Accept-Encoding "";          # store uncompressed (cache-key safe)
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;

            # --- Caching ---
            proxy_cache openmeteo;
            proxy_cache_key "$request_method$request_uri";   # full query string => unique key
            proxy_cache_valid 200 30m;                        # fresh window (tunable)
            proxy_cache_valid 404 1m;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;

            # --- Rate-limit / outage resilience ---
            # Keep serving the last good copy when upstream is unhappy.
            proxy_cache_use_stale error timeout updating
                                  http_429 http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;   # refresh in the background while serving stale
            proxy_cache_lock on;                # collapse concurrent MISSes into one upstream call
            proxy_cache_lock_timeout 10s;

            # Expose cache result so you can verify HIT/MISS from curl / browser.
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
